services:
  redis:
    image: redis:7
    container_name: aivuln-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
    image: aivuln-backend:local
    container_name: aivuln-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./controls:/app/controls:ro
      - ./framework_mappings:/app/framework_mappings:ro
      - ./inventory:/app/inventory:ro
      - /var/lib/ai-vulnerability-management/evidence:/app/evidence
      - /var/lib/ai-vulnerability-management/job-output:/app/job-output
      - /var/lib/ai-vulnerability-management/remote-cache:/app/remote-cache
      - /var/log/ai-vulnerability-management:/app/logs
      - /home/aivuln/.ssh:/home/aivuln/.ssh:ro
    ports:
      - "0.0.0.0:8000:8000"

  worker:
    build:
      context: ./backend
    image: aivuln-backend:local
    container_name: aivuln-worker
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    command: ["python", "-m", "app.worker"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./controls:/app/controls:ro
      - ./framework_mappings:/app/framework_mappings:ro
      - ./inventory:/app/inventory:ro
      - /var/lib/ai-vulnerability-management/evidence:/app/evidence
      - /var/lib/ai-vulnerability-management/job-output:/app/job-output
      - /var/lib/ai-vulnerability-management/remote-cache:/app/remote-cache
      - /var/log/ai-vulnerability-management:/app/logs
      - /home/aivuln/.ssh:/home/aivuln/.ssh:ro

  frontend:
    build:
      context: ./frontend
    image: aivuln-frontend:local
    container_name: aivuln-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "0.0.0.0:3000:5173"

volumes:
  redis_data:

networks:
  default:
    name: aivuln-net
    external: true
